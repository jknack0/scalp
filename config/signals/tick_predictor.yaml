# TickDirectionPredictor — Phase 13 Signal Config
# Loaded by TickPredictorSignal via strategy YAML signal_configs.tick_predictor

model:
  path: "models/tick_predictor/"
  lgbm_filename: "lgbm_latest.txt"
  calibrator_filename: "calibrator_latest.pkl"

  # LightGBM hyperparameters
  num_leaves: 63
  max_depth: 7
  learning_rate: 0.03
  n_estimators: 300
  subsample: 0.7
  colsample_bytree: 0.8
  min_child_samples: 50
  early_stopping_rounds: 30

features:
  ring_buffer_capacity: 200
  norm_buffer_capacity: 100
  feature_names:
    - ofi_10
    - ofi_30
    - obi_1
    - obi_5
    - microprice
    - microprice_vs_mid
    - cvd_delta_10
    - cvd_delta_30
    - cvd_slope
    - volume_imbalance_10
    - volume_zscore_20
    - return_1
    - return_5
    - return_10
    - realized_vol_20
    - return_autocorr_10
    - spread
    - spread_zscore_50

labels:
  vertical_barrier_bars: 15      # 1s bars = 15 second horizon
  tp_ticks: 4                    # 4 ticks = 1.00 point = $5.00 MES
  sl_ticks: 3                    # 3 ticks = 0.75 point = $3.75 MES
  volatility_scale: true
  vol_lookback_bars: 50
  min_vol_scale: 0.5
  max_vol_scale: 2.5
  tick_size: 0.25

calibration:
  method: temperature_scaling
  n_bins: 15
  recal_window: 1000
  ece_alert_threshold: 0.08
  min_samples_for_recal: 50

# ─────────────────────────────────────────────────────────────────
# CRITICAL: inference.tp_ticks and inference.sl_ticks must always
# equal labels.tp_ticks and labels.sl_ticks. The model predicts
# P(TP hit first) and P(SL hit first) for these specific barriers.
# Changing one without retraining the other produces invalid EV.
# ─────────────────────────────────────────────────────────────────
inference:
  # These MUST match labels: section exactly — EV is only valid for the
  # same TP/SL the model was trained to predict.
  tp_ticks: 4           # 4 ticks = 1.00 point = $5.00 MES profit target
  sl_ticks: 3           # 3 ticks = 0.75 point = $3.75 MES stop loss
  cost_ticks: 0.72      # round-trip: 2×$0.295 commission + ~$0.31 slippage / $1.25 per tick
  horizon_bars: 15      # must match labels.vertical_barrier_bars

  # EV thresholds — tune these after first live validation run
  ev_entry_threshold: 0.15    # min ev_normalized to consider a trade
                               # = EV must be at least 15% of TP after costs
  ev_strong_threshold: 0.30   # high conviction — used for Kelly sizing multiplier

  # Performance monitoring
  latency_warn_us: 500
  latency_history_size: 1000

training:
  lookback_days: 15
  val_days: 15
  min_cv_accuracy: 0.52
  embargo_bars: 20
  n_cv_splits: 5
  data_path: "data/parquet/"
  output_path: "data/tick_predictor/"
