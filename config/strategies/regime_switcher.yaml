# Strategy 10: Volatility Regime Switcher (HMM-Gated)
# Meta-strategy that adapts based on ADX regime.
# Mode A (ADX < 22): Mean reversion to VWAP on extreme RSI + deviation.
# Mode B (ADX >= 22): Momentum via EMA crossover aligned with recent bars.

strategy:
  strategy_id: regime_switcher
  max_signals_per_day: 5
  session_start: "09:30"
  session_end: "16:00"

bar:
  type: time
  freq: 5m
  enrich: false

# Signal pipeline: pre-computed per bar window
signals: [hmm_regime, vwap_session, rsi_momentum, adx, bollinger, ema_crossover, atr, relative_volume, session_time]
signal_configs:
  rsi_momentum:
    period: 5
  hmm_regime:
    model_path: models/hmm/v4_2state
    pass_states: [RANGE_BOUND]

# Declarative entry gates (evaluated by FilterEngine before strategy runs)
filters:
  # Time-of-day: 9:45 AM - 3:30 PM ET (minutes since midnight)
  - signal: session_time
    expr: ">= 585"
  - signal: session_time
    expr: "<= 930"
  # HMM regime must pass
  - signal: hmm_regime
    expr: passes
  # Volume must be >= 0.6x average
  - signal: relative_volume
    expr: ">= 0.6"

# Exit geometry is computed MANUALLY in on_bar (mode-dependent).
# These params are read by the strategy code directly.
exit:
  mode_a:
    time_stop_minutes: 15
    stop_atr_multiple: 2.0
    confidence: 0.7
    vwap_deviation_threshold: 2.0
    rsi_long_max: 25.0
    rsi_short_min: 75.0
  mode_b:
    time_stop_minutes: 25
    target_atr_multiple: 2.0
    stop_atr_multiple: 1.0
    confidence: 0.55
  early_exit:
    # Mode A early exits
    vwap_slope_threshold: 0.4
    adx_trend_threshold: 25.0
    # Mode B early exits
    adx_range_threshold: 18.0
    adverse_momentum_bars: 2
    adverse_momentum_atr_multiple: 1.5

# ADX threshold that separates Mode A (reversion) from Mode B (momentum)
regime:
  adx_threshold: 22.0
  # Number of aligned bars required for momentum confirmation
  momentum_confirm_bars: 3
