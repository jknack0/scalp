# Strategy 1: VWAP Band Reversion with regime gating
# Mean reversion to VWAP when price deviates >=3.0 SD during range-bound sessions.
# All entry gates are declarative filters evaluated by FilterEngine.
#
# Tuned 2026-03-11 joint entry+exit sweep (Mar 2015 - Feb 2025, 10yr):
#   64 trades, 70.3% WR, Sharpe 3.27, PF 2.04, $669 net, DD 1.79%
#   Exit mix: 72% TP, 12% hard stop, 8% early, 8% session
#   Key changes from v1: ADX <25→<20, stop 3→4x ATR, target 0.5→1.0 SD,
#   time 30→45 bars, trailing stop disabled (no effect over 10yr)

strategy:
  strategy_id: vwap_band_reversion
  max_signals_per_day: 999
  session_start: "09:30"
  session_end: "16:00"

bar:
  type: time
  freq: 5m
  enrich: false

# Signal pipeline: pre-computed per bar window
signals: [vwap_session, adx, atr, relative_volume, session_time, hmm_regime]
signal_configs:
  adx:
    period: 14
    threshold: 25.0
  hmm_regime:
    model_path: models/hmm/v4_2state
    pass_states: [RANGE_BOUND]

# All entry gates are declarative filters
filters:
  # Time-of-day: 9:45 AM - 3:00 PM ET (minutes since midnight)
  - signal: session_time
    expr: ">= 585"
  - signal: session_time
    expr: "<= 900"
  # VWAP must have stabilized (30+ bars into session)
  - signal: vwap_session
    field: session_age_bars
    expr: ">= 30"
  # VWAP slope must be flat (non-trending intraday)
  - signal: vwap_session
    field: slope
    expr: "abs <= 0.5"
  # Price must be >= 3.0 SD from VWAP
  - signal: vwap_session
    field: deviation_sd
    expr: "abs >= 3.0"
  # ADX must be below 20 (truly range-bound — tightened from <25)
  - signal: adx
    expr: "< 20.0"
  # Volume must be >= 0.3x average
  - signal: relative_volume
    expr: ">= 0.3"
  # HMM regime: only trade in range-bound
  - signal: hmm_regime
    expr: passes

# Declarative exits — evaluated by ExitEngine each bar (OR logic)
exits:
  # Hard stop: 4.0 x ATR from fill price (widened from 3.0)
  - type: static_stop
    enabled: true
    atr_multiple: 4.0
  # Take profit: price reverts to within 1.0 SD of VWAP (widened from 0.5)
  - type: vwap_reversion_target
    enabled: true
    target_sd_band: 1.0
    vwap_signal: vwap_session
    deviation_field: deviation_sd
  # Time stop: exit after 45 bars (= 225 min on 5m bars, extended from 30)
  - type: time_stop
    enabled: true
    max_bars: 45
  # VWAP slope going adverse = trend developing against us
  - type: adverse_signal_exit
    enabled: true
    signal: vwap_session
    field: slope
    long_threshold: -0.5
    short_threshold: 0.5
  # Regime flips to volatile while in a mean-reversion trade
  - type: regime_exit
    enabled: true
    hmm_signal: hmm_regime
    hostile_regimes_long: [1]
    hostile_regimes_short: [1]
    min_bars_before_active: 2

# Legacy exit config — kept for backward compat with ExitBuilder
exit:
  target:
    type: vwap
  stop:
    type: atr_multiple
    multiplier: 4.0
  time_stop_minutes: 225
