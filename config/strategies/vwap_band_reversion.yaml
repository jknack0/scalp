# Strategy 1: VWAP Band Reversion with regime gating
# Mean reversion to VWAP when price deviates >=2.5 SD during range-bound sessions.
# All entry gates are declarative filters evaluated by FilterEngine.
#
# Tuned 2026-03-12 joint entry+exit sweep with regime_v2 (Feb 2020 - Feb 2025, 5yr):
#   55 trades, 70.9% WR, Sharpe 2.96, PF 1.80, $667 net, DD 2.89%
#   Exit mix: 62% TP, 16% hard stop, 13% regime_flip, 5% session, 4% slope
#   Key changes from v2: regime_v2 (3-state HMM), ADX <20→<18, dev 3.0→2.5 SD,
#   stop 4→3x ATR, time 45→30 bars

strategy:
  strategy_id: vwap_band_reversion
  max_signals_per_day: 999
  session_start: "09:30"
  session_end: "16:00"

bar:
  type: time
  freq: 5m
  enrich: false

# Signal pipeline: pre-computed per bar window
signals: [vwap_session, adx, atr, relative_volume, session_time, regime_v2]
signal_configs:
  adx:
    period: 14
    threshold: 25.0
  regime_v2:
    model_path: models/regime_v2
    pass_states: [RANGING]

# All entry gates are declarative filters
filters:
  # Time-of-day: 9:45 AM - 3:00 PM ET (minutes since midnight)
  - signal: session_time
    expr: ">= 585"
  - signal: session_time
    expr: "<= 900"
  # VWAP must have stabilized (30+ bars into session)
  - signal: vwap_session
    field: session_age_bars
    expr: ">= 30"
  # VWAP slope must be flat (non-trending intraday)
  - signal: vwap_session
    field: slope
    expr: "abs <= 0.5"
  # Price must be >= 2.5 SD from VWAP (loosened from 3.0 — regime gate handles selectivity)
  - signal: vwap_session
    field: deviation_sd
    expr: "abs >= 2.5"
  # ADX must be below 18 (tightened from <20 — regime_v2 + ADX double-gate)
  - signal: adx
    expr: "< 18.0"
  # Volume must be >= 0.3x average
  - signal: relative_volume
    expr: ">= 0.3"
  # Regime V2: only trade in range-bound (also blocks on whipsaw halt + flat sizing)
  - signal: regime_v2
    expr: passes

# Declarative exits — evaluated by ExitEngine each bar (OR logic)
exits:
  # Hard stop: 3.0 x ATR from fill price (tightened from 4.0 — regime exit catches adverse moves)
  - type: static_stop
    enabled: true
    atr_multiple: 3.0
  # Take profit: price reverts to within 1.0 SD of VWAP (widened from 0.5)
  - type: vwap_reversion_target
    enabled: true
    target_sd_band: 1.0
    vwap_signal: vwap_session
    deviation_field: deviation_sd
  # Time stop: exit after 30 bars (= 150 min on 5m bars, tightened from 45)
  - type: time_stop
    enabled: true
    max_bars: 30
  # VWAP slope going adverse = trend developing against us
  - type: adverse_signal_exit
    enabled: true
    signal: vwap_session
    field: slope
    long_threshold: -0.5
    short_threshold: 0.5
  # Regime flips to trending or high-vol while in a mean-reversion trade
  - type: regime_exit
    enabled: true
    hmm_signal: regime_v2
    hostile_regimes_long: [0, 2]
    hostile_regimes_short: [0, 2]
    min_bars_before_active: 2

# Legacy exit config — kept for backward compat with ExitBuilder
exit:
  target:
    type: vwap
  stop:
    type: atr_multiple
    multiplier: 3.0
  time_stop_minutes: 150
