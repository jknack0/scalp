# Strategy 12: Donchian Channel Breakout
# Trend-following breakout on 20-bar Donchian channel with 10-bar trailing exit channel.
# ADX and relative volume filters gate entries to high-conviction breakouts only.
# Tuned 2026-03-13: full 11-param sweep over 2024 (4,608 configs, no regime gate).
# Best: Sharpe 3.47, 56.7% WR, $851 PnL, 104 trades, 3.5% DD, PF 1.53.

strategy:
  strategy_id: donchian_breakout
  max_signals_per_day: 5
  session_start: "10:00"
  session_end: "14:00"

bar:
  type: time
  freq: 5m
  enrich: false

# Signal pipeline: pre-computed per bar window
signals: [donchian_channel, adx, relative_volume, atr, session_time]
signal_configs:
  donchian_channel:
    entry_period: 20
    exit_period: 10
  adx:
    period: 14
    threshold: 30.0

donchian:
  target_atr: 2.0
  stop_atr: 1.5
  width_min: 2.0
  width_max: 30.0

# All entry gates are declarative filters
filters:
  # Time-of-day: 10:00 AM - 2:00 PM ET (minutes since midnight)
  - signal: session_time
    expr: ">= 600"
  - signal: session_time
    expr: "<= 840"
  # Donchian channel breakout required
  - signal: donchian_channel
    expr: passes
  # ADX must show strong trend
  - signal: adx
    expr: "> 30.0"
  # Volume confirmation
  - signal: relative_volume
    expr: ">= 0.8"

exit:
  time_stop_minutes: 90

# Declarative exits — evaluated by ExitEngine each bar (OR logic)
exits:
  - type: bracket_target
    enabled: true
  - type: bracket_stop
    enabled: true
  - type: time_stop
    enabled: true
    max_bars: 18
  # Trailing stop via 10-bar exit channel
  - type: price_vs_signal_exit
    enabled: true
    signal: donchian_channel
    long_field: exit_lower
    short_field: exit_upper
  # ADX collapse — trend dying
  - type: signal_bound_exit
    enabled: true
    signal: adx
    lower_bound: 12.0
