# Strategy 14: Initial Balance Fade
# Fades touches of IB high/low during range-bound sessions.
# Rejection candle + RSI confirmation at IB extremes, targeting IB mid.

strategy:
  strategy_id: ib_fade
  max_signals_per_day: 3
  session_start: "09:30"
  session_end: "16:00"

bar:
  type: time
  freq: 5m
  enrich: false

# Signal pipeline: pre-computed per bar window
signals: [initial_balance, adx, rsi_momentum, atr, relative_volume, session_time]
signal_configs:
  initial_balance:
    ib_minutes: 60
    proximity_points: 1.5
    range_min: 3.0
    range_max: 20.0
  rsi_momentum:
    period: 5
    long_threshold: 35.0
    short_threshold: 65.0
  adx:
    period: 14
    threshold: 25.0

# All entry gates are declarative filters
filters:
  # Time-of-day: 10:30 AM - 3:00 PM ET (minutes since midnight)
  - signal: session_time
    expr: ">= 630"
  - signal: session_time
    expr: "<= 900"
  # IB signal must pass (near IB extreme, no breakout)
  - signal: initial_balance
    expr: passes
  # ADX must be below 25 (range-bound, not trending)
  - signal: adx
    expr: "< 25.0"
  # Volume must be >= 0.5x average
  - signal: relative_volume
    expr: ">= 0.5"

exit:
  target:
    type: ib_mid
  stop:
    type: fixed_ticks
    ticks: 10
  time_stop_minutes: 30

# Declarative exits — evaluated by ExitEngine each bar (OR logic)
exits:
  - type: bracket_target
    enabled: true
  - type: bracket_stop
    enabled: true
  - type: time_stop
    enabled: true
    max_bars: 6
  # IB break: price breaks beyond IB range
  - type: price_vs_signal_exit
    enabled: true
    signal: initial_balance
    long_field: ib_low
    short_field: ib_high
    offset: 1.0
  # ADX trending: trend developing, fade thesis fails
  - type: signal_bound_exit
    enabled: true
    signal: adx
    upper_bound: 28.0
